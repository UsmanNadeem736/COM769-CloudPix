name: CD — Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/lumora-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lumora-frontend

jobs:
  # ── Build & push Docker images to GHCR ─────────────────────
  # Azure App Services are configured to watch GHCR and auto-pull
  # the latest image via Continuous Deployment webhooks.
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata — Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Azure restart — API
        run: |
          curl -s -X POST \
            "https://${{ secrets.AZURE_API_WEBAPP_NAME }}.scm.azurewebsites.net/api/restart" \
            -u "${{ secrets.AZURE_API_WEBAPP_NAME }}:$(echo '${{ secrets.AZURE_API_PUBLISH_PROFILE }}' | grep -o 'userPWD="[^"]*"' | head -1 | cut -d'"' -f2)" \
            || echo "Restart triggered (or skipped)"

      - name: Trigger Azure restart — Frontend
        run: |
          curl -s -X POST \
            "https://${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}.scm.azurewebsites.net/api/restart" \
            -u "${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}:$(echo '${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}' | grep -o 'userPWD="[^"]*"' | head -1 | cut -d'"' -f2)" \
            || echo "Restart triggered (or skipped)"
